<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>دستیار بایت‌لب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=Vazirmatn:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0e14;
    --surface: #15171f;
    --surface-2: #1c1f2a;
    --border: #262a38;
    --accent: #7c6cf0;
    --accent-2: #f5b841;
    --text: #e8e8ee;
    --text-dim: #8b8fa3;
    --danger: #ef5d6f;
    --radius: 16px;
    font-family: 'Vazirmatn', system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .widget {
    width: 100%;
    max-width: 460px;
    height: 720px;
    max-height: 92vh;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    position: relative;
  }

  /* ---------- Header ---------- */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
  }

  .logo-dot {
    width: 38px;
    height: 38px;
    border-radius: 11px;
    background: linear-gradient(135deg, var(--accent), #4d3fc7);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 16px;
    color: white;
    flex-shrink: 0;
  }

  .header-text .title {
    font-weight: 700;
    font-size: 15px;
  }

  .header-text .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 6px #4ade80;
  }

  /* ---------- Messages ---------- */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

  .msg-row {
    display: flex;
    flex-direction: column;
    max-width: 84%;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { align-self: flex-start; align-items: flex-start; }
  .msg-row.assistant { align-self: flex-end; align-items: flex-end; }

  .bubble {
    padding: 11px 15px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg-row.user .bubble {
    background: var(--accent-2);
    color: #24190a;
    border-bottom-left-radius: 4px;
  }

  .msg-row.assistant .bubble {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-bottom-right-radius: 4px;
  }

  .msg-images {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .msg-images img {
    width: 64px;
    height: 64px;
    object-fit: cover;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .msg-audio-tag {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 4px;
  }

  /* ---------- Suggested actions ---------- */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
    align-self: flex-end;
    max-width: 84%;
    justify-content: flex-end;
  }

  .suggestion-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: inherit;
    font-size: 12.5px;
    padding: 7px 13px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .suggestion-btn:hover {
    background: var(--accent);
    color: white;
  }

  /* ---------- Typing indicator ---------- */
  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 15px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-right-radius: 4px;
    align-self: flex-end;
    width: fit-content;
  }

  .typing span {
    width: 6px;
    height: 6px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* ---------- Image preview strip ---------- */
  .image-preview-strip {
    display: none;
    gap: 8px;
    padding: 10px 16px 0;
    flex-wrap: wrap;
  }
  .image-preview-strip.active { display: flex; }

  .preview-thumb {
    position: relative;
    width: 52px;
    height: 52px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .preview-thumb .remove {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    background: rgba(0,0,0,0.7);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    cursor: pointer;
    line-height: 1;
  }

  /* ---------- Input bar ---------- */
  .input-bar {
    border-top: 1px solid var(--border);
    padding: 12px 14px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--surface);
  }

  .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn.recording {
    background: var(--danger);
    color: white;
    border-color: var(--danger);
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(239,93,111,0.5); }
    70% { box-shadow: 0 0 0 8px rgba(239,93,111,0); }
    100% { box-shadow: 0 0 0 0 rgba(239,93,111,0); }
  }

  textarea#userInput {
    flex: 1;
    resize: none;
    max-height: 100px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    line-height: 1.6;
  }
  textarea#userInput:focus { border-color: var(--accent); }

  .send-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ---------- Drag & drop overlay ---------- */
  .drop-overlay {
    position: absolute;
    inset: 0;
    background: rgba(124,108,240,0.15);
    backdrop-filter: blur(3px);
    border: 2px dashed var(--accent);
    border-radius: 22px;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
  }
  .drop-overlay.active { display: flex; }
  .drop-overlay .drop-text {
    background: var(--surface);
    padding: 14px 22px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
    border: 1px solid var(--accent);
  }

  input[type="file"] { display: none; }

  .hint-empty {
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    margin: auto;
    line-height: 2;
  }
</style>
</head>
<body>

<div class="widget" id="widget">

  <div class="drop-overlay" id="dropOverlay">
    <div class="drop-text">📎 عکس رو اینجا رها کن</div>
  </div>

  <div class="header">
    <div class="logo-dot">BL</div>
    <div class="header-text">
      <div class="title">دستیار هوش مصنوعی بایت‌لب</div>
      <div class="subtitle"><span class="status-dot"></span> آنلاین و آماده کمک</div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="hint-empty">
      سلام! هر سوالی درباره خدمات بایت‌لب داری بپرس،<br/>
      یا یه اسکرین‌شات از خطا/طرح گرافیکی بفرست 🙂
    </div>
  </div>

  <div class="image-preview-strip" id="previewStrip"></div>

  <div class="input-bar">
    <input type="file" id="fileInput" accept="image/*" multiple />
    <div class="icon-btn" id="attachBtn" title="ارسال عکس">📎</div>
    <div class="icon-btn" id="micBtn" title="پیام صوتی">🎤</div>
    <textarea id="userInput" rows="1" placeholder="پیامت رو بنویس..."></textarea>
    <button class="send-btn" id="sendBtn" title="ارسال">➤</button>
  </div>

</div>

<script>
// =====================================================================
// تنظیمات — این آدرس رو با آدرس واقعی Worker خودتون جایگزین کنید
// =====================================================================
const WORKER_URL = "https://bytelab-ai.bytelab-workerbytelab.workers.dev";

// =====================================================================
// وضعیت برنامه
// =====================================================================
let conversation = [];       // { role, content }
let pendingImages = [];      // [{ base64, previewUrl }]
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];

const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const attachBtn = document.getElementById("attachBtn");
const fileInput = document.getElementById("fileInput");
const micBtn = document.getElementById("micBtn");
const previewStrip = document.getElementById("previewStrip");
const dropOverlay = document.getElementById("dropOverlay");
const widget = document.getElementById("widget");

// ---------------------------------------------------------------
// کمکی: اسکرول به پایین
// ---------------------------------------------------------------
function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function clearEmptyHint() {
  const hint = messagesEl.querySelector(".hint-empty");
  if (hint) hint.remove();
}

// ---------------------------------------------------------------
// رندر یک پیام کاربر
// ---------------------------------------------------------------
function renderUserMessage(text, imagePreviews, hasAudio) {
  clearEmptyHint();
  const row = document.createElement("div");
  row.className = "msg-row user";

  if (imagePreviews && imagePreviews.length) {
    const imgWrap = document.createElement("div");
    imgWrap.className = "msg-images";
    imagePreviews.forEach((src) => {
      const img = document.createElement("img");
      img.src = src;
      imgWrap.appendChild(img);
    });
    row.appendChild(imgWrap);
  }

  if (hasAudio) {
    const tag = document.createElement("div");
    tag.className = "msg-audio-tag";
    tag.textContent = "🎤 پیام صوتی";
    row.appendChild(tag);
  }

  if (text) {
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    row.appendChild(bubble);
  }

  messagesEl.appendChild(row);
  scrollToBottom();
}

// ---------------------------------------------------------------
// رندر یک پیام دستیار + دکمه‌های پیشنهادی
// ---------------------------------------------------------------
function renderAssistantMessage(text, suggestedActions) {
  clearEmptyHint();
  const row = document.createElement("div");
  row.className = "msg-row assistant";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;
  row.appendChild(bubble);

  messagesEl.appendChild(row);

  if (suggestedActions && suggestedActions.length) {
    const sugWrap = document.createElement("div");
    sugWrap.className = "suggestions";
    suggestedActions.forEach((label) => {
      const btn = document.createElement("button");
      btn.className = "suggestion-btn";
      btn.textContent = label;
      btn.onclick = () => {
        sugWrap.remove(); // بعد از کلیک، پیشنهادها رو پاک کن
        sendMessage(label);
      };
      sugWrap.appendChild(btn);
    });
    messagesEl.appendChild(sugWrap);
  }

  scrollToBottom();
}

function showTyping() {
  const row = document.createElement("div");
  row.className = "msg-row assistant";
  row.id = "typingRow";
  const typing = document.createElement("div");
  typing.className = "typing";
  typing.innerHTML = "<span></span><span></span><span></span>";
  row.appendChild(typing);
  messagesEl.appendChild(row);
  scrollToBottom();
}

function hideTyping() {
  const row = document.getElementById("typingRow");
  if (row) row.remove();
}

// ---------------------------------------------------------------
// فایل → Base64
// ---------------------------------------------------------------
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result); // data URL کامل
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ---------------------------------------------------------------
// افزودن عکس‌های انتخاب/دراپ‌شده به لیست در انتظار
// ---------------------------------------------------------------
async function addImages(fileList) {
  const files = Array.from(fileList).filter((f) => f.type.startsWith("image/"));
  const MAX_IMAGES = 4;

  for (const file of files) {
    if (pendingImages.length >= MAX_IMAGES) {
      alert(`حداکثر ${MAX_IMAGES} عکس در هر پیام مجازه.`);
      break;
    }
    try {
      const base64 = await fileToBase64(file);
      pendingImages.push({ base64 });
      renderPreviewStrip();
    } catch (e) {
      console.error("خطا در خواندن عکس", e);
    }
  }
}

function renderPreviewStrip() {
  previewStrip.innerHTML = "";
  if (pendingImages.length === 0) {
    previewStrip.classList.remove("active");
    return;
  }
  previewStrip.classList.add("active");
  pendingImages.forEach((img, idx) => {
    const thumb = document.createElement("div");
    thumb.className = "preview-thumb";
    const imgEl = document.createElement("img");
    imgEl.src = img.base64;
    const removeBtn = document.createElement("div");
    removeBtn.className = "remove";
    removeBtn.textContent = "✕";
    removeBtn.onclick = () => {
      pendingImages.splice(idx, 1);
      renderPreviewStrip();
    };
    thumb.appendChild(imgEl);
    thumb.appendChild(removeBtn);
    previewStrip.appendChild(thumb);
  });
}

// ---------------------------------------------------------------
// انتخاب فایل از دکمه‌ی 📎
// ---------------------------------------------------------------
attachBtn.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", (e) => {
  addImages(e.target.files);
  fileInput.value = "";
});

// ---------------------------------------------------------------
// Drag & Drop روی کل ویجت
// ---------------------------------------------------------------
let dragCounter = 0;

widget.addEventListener("dragenter", (e) => {
  e.preventDefault();
  dragCounter++;
  dropOverlay.classList.add("active");
});

widget.addEventListener("dragover", (e) => e.preventDefault());

widget.addEventListener("dragleave", (e) => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    dropOverlay.classList.remove("active");
  }
});

widget.addEventListener("drop", (e) => {
  e.preventDefault();
  dragCounter = 0;
  dropOverlay.classList.remove("active");
  if (e.dataTransfer.files && e.dataTransfer.files.length) {
    addImages(e.dataTransfer.files);
  }
});

// ---------------------------------------------------------------
// ضبط صدا (MediaRecorder → Base64)
// ---------------------------------------------------------------
micBtn.addEventListener("click", async () => {
  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach((t) => t.stop());
        const blob = new Blob(audioChunks, { type: "audio/webm" });
        const base64 = await blobToBase64(blob);
        sendMessage("", { audioBase64: base64 });
      };
      mediaRecorder.start();
      isRecording = true;
      micBtn.classList.add("recording");
      micBtn.textContent = "⏹";
    } catch (err) {
      alert("دسترسی به میکروفون امکان‌پذیر نیست. لطفاً اجازه دسترسی رو تأیید کن.");
    }
  } else {
    mediaRecorder.stop();
    isRecording = false;
    micBtn.classList.remove("recording");
    micBtn.textContent = "🎤";
  }
});

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

// ---------------------------------------------------------------
// ارسال پیام (متن و/یا عکس‌ها و/یا صدا) به Worker
// ---------------------------------------------------------------
async function sendMessage(overrideText, opts) {
  opts = opts || {};
  const text = overrideText !== undefined ? overrideText : inputEl.value.trim();
  const imagesToSend = pendingImages.map((i) => i.base64);
  const audioToSend = opts.audioBase64 || null;

  if (!text && imagesToSend.length === 0 && !audioToSend) return;

  const imagePreviewUrls = imagesToSend.slice();
  renderUserMessage(text, imagePreviewUrls, !!audioToSend);

  // پاک کردن ورودی‌ها
  inputEl.value = "";
  autoResizeTextarea();
  pendingImages = [];
  renderPreviewStrip();

  if (text) {
    conversation.push({ role: "user", content: text });
  }

  sendBtn.disabled = true;
  showTyping();

  try {
    const payload = {
      system:
        "تو دستیار هوش مصنوعی سایت بایت‌لب (BYTELAB) هستی. مودب، مفید و مختصر جواب بده.",
      messages: conversation,
    };
    if (imagesToSend.length === 1) payload.image = imagesToSend[0];
    if (imagesToSend.length > 1) payload.images = imagesToSend;
    if (audioToSend) payload.audio = audioToSend;

    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });

    const data = await res.json();
    hideTyping();

    if (!res.ok || data.error) {
      renderAssistantMessage(data.error || "متأسفانه خطایی پیش اومد. دوباره امتحان کن.");
      return;
    }

    const replyText =
      data.content && data.content[0] && data.content[0].text
        ? data.content[0].text
        : "پاسخی دریافت نشد.";

    conversation.push({ role: "assistant", content: replyText });
    renderAssistantMessage(replyText, data.suggested_actions);
  } catch (err) {
    hideTyping();
    renderAssistantMessage("اتصال به سرور برقرار نشد. اتصال اینترنتت رو چک کن.");
  } finally {
    sendBtn.disabled = false;
  }
}

// ---------------------------------------------------------------
// رویدادهای ارسال
// ---------------------------------------------------------------
sendBtn.addEventListener("click", () => sendMessage());

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function autoResizeTextarea() {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + "px";
}
inputEl.addEventListener("input", autoResizeTextarea);
</script>

</body>
</html>
