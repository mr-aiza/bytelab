<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ثبت تیکت پشتیبانی | بایت‌لب</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#070b12; --panel:#0f1620; --line:#1e2a38;
    --cyan:#4df0c9; --violet:#9c7bff; --paper:#eaf0f4; --muted:#7c8b9c;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--ink); color:var(--paper); font-family:'Vazirmatn',sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{
    max-width:480px; width:100%; background:var(--panel); border:1px solid var(--line);
    border-radius:18px; padding:32px 26px;
  }
  h1{font-size:20px; margin-bottom:8px;}
  p.sub{color:var(--muted); font-size:14px; margin-bottom:24px;}
  label{display:block; font-size:13px; color:var(--muted); margin-bottom:6px; margin-top:16px;}
  input, textarea{
    width:100%; background:#141d2b; border:1px solid var(--line); color:var(--paper);
    border-radius:10px; padding:12px 14px; font-family:inherit; font-size:14px; outline:none;
  }
  input:focus, textarea:focus{border-color:var(--cyan);}
  textarea{min-height:110px; resize:vertical;}
  button{
    margin-top:22px; width:100%; background:var(--cyan); color:#06120f; font-weight:700;
    border:none; padding:14px; border-radius:12px; font-size:15px; cursor:pointer;
  }
  button:disabled{opacity:.5; cursor:not-allowed;}
  .msg{margin-top:16px; font-size:14px; text-align:center;}
  .msg.ok{color:var(--cyan);}
  .msg.err{color:#ff7b7b;}
</style>
</head>
<body>
  <div class="card">
    <h1>🎫 ثبت تیکت پشتیبانی</h1>
    <p class="sub">مشکلت رو برامون بنویس، در اسرع وقت بررسیش می‌کنیم.</p>

    <label>اسم شما</label>
    <input id="name" type="text" placeholder="مثلاً علی احمدی">

    <label>راه تماس (شماره یا ایمیل)</label>
    <input id="contact" type="text" placeholder="09xxxxxxxxx یا ایمیل">

    <label>موضوع</label>
    <input id="subject" type="text" placeholder="مثلاً مشکل در سایت">

    <label>پیام</label>
    <textarea id="message" placeholder="مشکل رو کامل توضیح بده..."></textarea>

    <button id="sendBtn">ارسال تیکت</button>
    <div id="statusMsg" class="msg"></div>
  </div>

<script>
  // همون آدرس Worker که چت هم ازش استفاده می‌کنه
  const API_ENDPOINT = "https://bytelab-ai.bytelab-workerbytelab.workers.dev";

  const sendBtn = document.getElementById('sendBtn');
  const statusMsg = document.getElementById('statusMsg');

  sendBtn.addEventListener('click', async () => {
    const name = document.getElementById('name').value.trim();
    const contact = document.getElementById('contact').value.trim();
    const subject = document.getElementById('subject').value.trim();
    const message = document.getElementById('message').value.trim();

    if(!message){
      statusMsg.textContent = 'لطفاً پیام رو بنویس.';
      statusMsg.className = 'msg err';
      return;
    }

    sendBtn.disabled = true;
    statusMsg.textContent = 'در حال ارسال...';
    statusMsg.className = 'msg';

    try{
      const res = await fetch(API_ENDPOINT + '/ticket', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, contact, subject, message })
      });
      const data = await res.json();
      if(data.ok){
        statusMsg.textContent = '✅ تیکت با موفقیت ثبت شد! به‌زودی باهات تماس می‌گیریم.';
        statusMsg.className = 'msg ok';
        document.getElementById('name').value = '';
        document.getElementById('contact').value = '';
        document.getElementById('subject').value = '';
        document.getElementById('message').value = '';
      } else {
        statusMsg.textContent = '❌ خطا: ' + (data.error || 'مشکلی پیش اومد.');
        statusMsg.className = 'msg err';
      }
    }catch(e){
      statusMsg.textContent = '❌ مشکلی در ارتباط پیش اومد. دوباره تلاش کن.';
      statusMsg.className = 'msg err';
    }
    sendBtn.disabled = false;
  });
</script>
</body>
</html>
