<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود / ثبت‌نام | بایت‌لب</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#070b12; --panel:#0f1620; --panel-2:#141d2b; --line:#1e2a38;
    --cyan:#4df0c9; --violet:#9c7bff; --paper:#eaf0f4; --muted:#7c8b9c; --radius:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{overflow-x:hidden;}
  body{
    background:var(--ink); color:var(--paper); font-family:'Vazirmatn',sans-serif;
    line-height:1.7; min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:24px; overflow-x:hidden;
  }
  a{color:inherit;text-decoration:none;}
  .glow{position:fixed;border-radius:50%;filter:blur(90px);z-index:0;pointer-events:none;}
  .glow-1{width:340px;height:340px;background:var(--cyan);opacity:.12;top:-100px;right:-100px;}
  .glow-2{width:340px;height:340px;background:var(--violet);opacity:.12;bottom:-100px;left:-100px;}

  .card{
    position:relative;z-index:1; width:100%; max-width:420px;
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:36px 28px; box-shadow:0 20px 60px rgba(0,0,0,.4);
  }
  .brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:22px;}
  .brand .mark{
    width:38px;height:38px;border-radius:10px;
    background:linear-gradient(135deg,var(--cyan),var(--violet));
    display:flex;align-items:center;justify-content:center;
    color:var(--ink);font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;
    box-shadow:0 0 24px rgba(77,240,201,.45);
  }
  .brand span{font-weight:800;font-size:20px;}
  .brand .tag{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);font-weight:400;letter-spacing:.08em;margin-right:2px;}

  .tabs{display:flex;background:var(--panel-2);border-radius:12px;padding:4px;margin-bottom:24px;}
  .tab{flex:1;text-align:center;padding:10px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;color:var(--muted);transition:.2s;}
  .tab.active{background:linear-gradient(135deg,var(--cyan),var(--violet));color:var(--ink);}

  label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;}
  .field{margin-bottom:16px;}
  input{
    width:100%; background:var(--panel-2); border:1px solid var(--line); border-radius:12px;
    padding:13px 14px; color:var(--paper); font-family:'Vazirmatn',sans-serif; font-size:14px; outline:none;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  input::placeholder{color:#4c5a6b;}
  input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(77,240,201,.15);}

  .submit-btn{
    width:100%; background:linear-gradient(135deg,var(--cyan),var(--violet)); color:var(--ink);
    font-weight:800; font-size:15px; padding:14px; border:none; border-radius:12px; cursor:pointer;
    margin-top:6px; transition:transform .2s ease, box-shadow .2s ease, opacity .2s ease;
    box-shadow:0 0 24px rgba(77,240,201,.25);
  }
  .submit-btn:hover{transform:translateY(-1px);box-shadow:0 0 32px rgba(77,240,201,.4);}
  .submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}

  .divider{display:flex;align-items:center;gap:10px;margin:20px 0;color:var(--muted);font-size:12px;}
  .divider::before, .divider::after{content:"";flex:1;height:1px;background:var(--line);}

  .google-btn{
    width:100%; display:flex; align-items:center; justify-content:center; gap:10px;
    background:var(--panel-2); border:1px solid var(--line); color:var(--paper);
    font-weight:700; font-size:14px; padding:12px; border-radius:12px; cursor:pointer;
    transition:.2s;
  }
  .google-btn:hover{border-color:var(--muted);}
  .google-btn svg{width:18px;height:18px;}

  .status{margin-top:14px;font-size:13px;text-align:center;display:none;}
  .status.show{display:block;}
  .status.ok{color:var(--cyan);}
  .status.err{color:#ff8a8a;}

  .back-link{display:block;text-align:center;margin-top:22px;font-size:13px;color:var(--muted);}
  .back-link:hover{color:var(--cyan);}
</style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="card">
  <div class="brand">
    <div class="mark">B</div>
    <span>بایت‌لب<span class="tag">BYTE_LAB</span></span>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabLogin">ورود</div>
    <div class="tab" id="tabSignup">ثبت‌نام</div>
  </div>

  <form id="authForm">
    <div class="field">
      <label for="email">ایمیل</label>
      <input type="email" id="email" placeholder="you@example.com" dir="ltr" required>
    </div>
    <div class="field">
      <label for="password">رمز عبور</label>
      <input type="password" id="password" placeholder="حداقل ۶ کاراکتر" dir="ltr" required minlength="6">
    </div>
    <button type="submit" class="submit-btn" id="submitBtn">ورود</button>
  </form>

  <div class="divider">یا</div>

  <button class="google-btn" id="googleBtn">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.66-2.25 1.06-3.71 1.06-2.86 0-5.28-1.93-6.14-4.53H2.18v2.85A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.86 14.1a6.6 6.6 0 0 1 0-4.2V7.05H2.18a11 11 0 0 0 0 9.9l3.68-2.85z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1a11 11 0 0 0-9.82 6.05l3.68 2.85C6.72 7.3 9.14 5.38 12 5.38z"/></svg>
    ورود با گوگل
  </button>

  <div class="status" id="statusMsg"></div>

  <a href="../index.html" class="back-link">← بازگشت به سایت بایت‌لب</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    GoogleAuthProvider, signInWithPopup, getAdditionalUserInfo, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC4H9JHfDNCFiNWSx9JXA-L2MzleiQvzQI",
    authDomain: "bytelab-bot-7a303.firebaseapp.com",
    projectId: "bytelab-bot-7a303",
    storageBucket: "bytelab-bot-7a303.firebasestorage.app",
    messagingSenderId: "350774453186",
    appId: "1:350774453186:web:15d2c832986804812c6c5b",
    measurementId: "G-76F34JK2RY"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // آدرس Cloudflare Worker که پیام‌ها رو به تلگرام می‌فرسته
  // بعد از دیپلوی Worker، این مقدار رو با آدرس واقعی جایگزین کنید
  const TELEGRAM_WORKER_URL = "https://bytelab-telegram.bytelab-workerbytelab.workers.dev";

  function notifyNewSignup(user, source) {
    fetch(TELEGRAM_WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        type: "profile",
        email: user.email || "-",
        uid: user.uid,
        source: source
      })
    }).catch(() => { /* اگه ارسال به تلگرام fail شد، جریان ثبت‌نام رو خراب نکن */ });
  }

  // اگه از قبل لاگین بود، مستقیم بره پروفایل
  onAuthStateChanged(auth, (user) => {
    if (user && sessionStorage.getItem("bytelab_just_loaded") !== "1") {
      sessionStorage.setItem("bytelab_just_loaded", "1");
      window.location.href = "profile.html";
    }
  });

  const tabLogin = document.getElementById("tabLogin");
  const tabSignup = document.getElementById("tabSignup");
  const submitBtn = document.getElementById("submitBtn");
  const form = document.getElementById("authForm");
  const statusEl = document.getElementById("statusMsg");
  let mode = "login";

  function showStatus(text, type) {
    statusEl.textContent = text;
    statusEl.className = "status show " + type;
  }

  function setMode(newMode) {
    mode = newMode;
    if (mode === "login") {
      tabLogin.classList.add("active");
      tabSignup.classList.remove("active");
      submitBtn.textContent = "ورود";
    } else {
      tabSignup.classList.add("active");
      tabLogin.classList.remove("active");
      submitBtn.textContent = "ثبت‌نام";
    }
    statusEl.className = "status";
  }

  tabLogin.addEventListener("click", () => setMode("login"));
  tabSignup.addEventListener("click", () => setMode("signup"));

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    submitBtn.disabled = true;
    statusEl.className = "status";

    try {
      if (mode === "signup") {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        notifyNewSignup(cred.user, "ثبت‌نام با ایمیل (بایت‌لب)");
      } else {
        await signInWithEmailAndPassword(auth, email, password);
      }
      showStatus("موفقیت‌آمیز بود ✅ در حال انتقال...", "ok");
      setTimeout(() => { window.location.href = "profile.html"; }, 800);
    } catch (err) {
      showStatus(translateFirebaseError(err.code), "err");
    } finally {
      submitBtn.disabled = false;
    }
  });

  document.getElementById("googleBtn").addEventListener("click", async () => {
    try {
      const provider = new GoogleAuthProvider();
      const result = await signInWithPopup(auth, provider);
      const info = getAdditionalUserInfo(result);
      if (info && info.isNewUser) {
        notifyNewSignup(result.user, "ثبت‌نام با گوگل (بایت‌لب)");
      }
      showStatus("موفقیت‌آمیز بود ✅ در حال انتقال...", "ok");
      setTimeout(() => { window.location.href = "profile.html"; }, 800);
    } catch (err) {
      showStatus(translateFirebaseError(err.code), "err");
    }
  });

  function translateFirebaseError(code) {
    const map = {
      "auth/email-already-in-use": "این ایمیل قبلاً ثبت‌نام شده. وارد شوید.",
      "auth/invalid-email": "ایمیل معتبر نیست.",
      "auth/weak-password": "رمز عبور باید حداقل ۶ کاراکتر باشد.",
      "auth/user-not-found": "کاربری با این ایمیل پیدا نشد.",
      "auth/wrong-password": "رمز عبور اشتباه است.",
      "auth/invalid-credential": "ایمیل یا رمز عبور اشتباه است.",
      "auth/popup-closed-by-user": "پنجره ورود با گوگل بسته شد."
    };
    return map[code] || "خطایی رخ داد، دوباره تلاش کنید.";
  }
</script>

</body>
</html>
