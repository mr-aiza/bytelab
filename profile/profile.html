<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پروفایل من | بایت‌لب</title>
<meta name="robots" content="noindex">
<meta name="description" content="پروفایل کاربری شما در بایت‌لب.">
<link rel="canonical" href="https://bytelabpro.xyz/profile/profile.html">
<meta property="og:type" content="website">
<meta property="og:title" content="پروفایل من | بایت‌لب">
<meta property="og:description" content="پروفایل کاربری شما در بایت‌لب.">
<meta property="og:url" content="https://bytelabpro.xyz/profile/profile.html">
<meta property="og:image" content="https://bytelabpro.xyz/favicon-512.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#070b12; --panel:#0f1620; --panel-2:#141d2b; --line:#1e2a38;
    --cyan:#4df0c9; --violet:#9c7bff; --paper:#eaf0f4; --muted:#7c8b9c; --radius:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{overflow-x:hidden;}
  body{
    background:var(--ink); color:var(--paper); font-family:'Vazirmatn',sans-serif;
    line-height:1.7; min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:24px; overflow-x:hidden;
  }
  a{color:inherit;text-decoration:none;}
  .glow{position:fixed;border-radius:50%;filter:blur(90px);z-index:0;pointer-events:none;}
  .glow-1{width:340px;height:340px;background:var(--cyan);opacity:.12;top:-100px;right:-100px;}
  .glow-2{width:340px;height:340px;background:var(--violet);opacity:.12;bottom:-100px;left:-100px;}

  .card{
    position:relative;z-index:1; width:100%; max-width:420px;
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:36px 28px; box-shadow:0 20px 60px rgba(0,0,0,.4); text-align:center;
  }
  .avatar{
    width:76px;height:76px;border-radius:50%;margin:0 auto 18px;
    background:linear-gradient(135deg,var(--cyan),var(--violet));
    display:flex;align-items:center;justify-content:center;
    font-size:28px;font-weight:800;color:var(--ink);
    box-shadow:0 0 30px rgba(77,240,201,.35);
  }
  h1{font-size:20px;font-weight:800;margin-bottom:4px;}
  .email{color:var(--muted);font-size:14px;margin-bottom:24px;direction:ltr;}

  .info-row{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--panel-2); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; margin-bottom:10px; font-size:13px;
  }
  .info-row span:first-child{color:var(--muted);}
  .info-row span:last-child{font-family:'JetBrains Mono',monospace;direction:ltr;word-break:break-all;text-align:left;}

  .username-field{margin-bottom:16px;text-align:right;}
  .username-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;}
  .username-row{display:flex;gap:8px;}
  .username-row input{
    flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;
    padding:11px 13px;color:var(--paper);font-family:'Vazirmatn',sans-serif;font-size:14px;outline:none;
  }
  .username-row input:focus{border-color:var(--cyan);}
  .save-btn{
    background:linear-gradient(135deg,var(--cyan),var(--violet));color:var(--ink);
    font-weight:800;font-size:13px;padding:0 16px;border:none;border-radius:10px;cursor:pointer;
  }
  .save-btn:disabled{opacity:.5;cursor:not-allowed;}
  .username-status{font-size:12px;margin-top:6px;min-height:16px;}
  .username-status.ok{color:var(--cyan);}
  .username-status.err{color:#ff8a8a;}

  .signout-btn{
    width:100%; background:transparent; border:1px solid #ff8a8a; color:#ff8a8a;
    font-weight:700; font-size:14px; padding:13px; border-radius:12px; cursor:pointer;
    margin-top:20px; transition:.2s;
  }
  .signout-btn:hover{background:rgba(255,138,138,.1);}

  .back-link{display:block;text-align:center;margin-top:22px;font-size:13px;color:var(--muted);}
  .back-link:hover{color:var(--cyan);}

  .loading{color:var(--muted);font-size:14px;text-align:center;}
</style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="card" id="card">
  <p class="loading">در حال بارگذاری...</p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC4H9JHfDNCFiNWSx9JXA-L2MzleiQvzQI",
    authDomain: "bytelab-bot-7a303.firebaseapp.com",
    projectId: "bytelab-bot-7a303",
    storageBucket: "bytelab-bot-7a303.firebasestorage.app",
    messagingSenderId: "350774453186",
    appId: "1:350774453186:web:15d2c832986804812c6c5b",
    measurementId: "G-76F34JK2RY"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const card = document.getElementById("card");

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "login.html";
      return;
    }

    const initial = (user.displayName || user.email || "?").charAt(0).toUpperCase();
    const joined = user.metadata?.creationTime
      ? new Date(user.metadata.creationTime).toLocaleDateString("fa-IR")
      : "-";

    card.innerHTML = `
      <div class="avatar">${initial}</div>
      <h1>${user.displayName ? user.displayName : "خوش اومدی"}</h1>
      <div class="email">${user.email || "بدون ایمیل"}</div>

      <div class="username-field">
        <label for="displayName">نام کاربری (نمایشی)</label>
        <div class="username-row">
          <input type="text" id="displayName" placeholder="مثلاً علی احمدی" value="${user.displayName || ""}">
          <button class="save-btn" id="saveNameBtn">ذخیره</button>
        </div>
        <div class="username-status" id="nameStatus"></div>
      </div>

      <div class="info-row"><span>UID</span><span>${user.uid}</span></div>
      <div class="info-row"><span>تاریخ عضویت</span><span>${joined}</span></div>
      <div class="info-row"><span>روش ورود</span><span>${user.providerData[0]?.providerId === "google.com" ? "گوگل" : "ایمیل"}</span></div>

      <button class="signout-btn" id="signoutBtn">خروج از حساب</button>
      <a href="../index.html" class="back-link">← بازگشت به سایت بایت‌لب</a>
    `;

    document.getElementById("saveNameBtn").addEventListener("click", async () => {
      const nameInput = document.getElementById("displayName");
      const status = document.getElementById("nameStatus");
      const newName = nameInput.value.trim();

      if (!newName) {
        status.textContent = "نام نمی‌تواند خالی باشد.";
        status.className = "username-status err";
        return;
      }

      try {
        await updateProfile(auth.currentUser, { displayName: newName });
        status.textContent = "ذخیره شد ✅";
        status.className = "username-status ok";
        card.querySelector("h1").textContent = newName;
        card.querySelector(".avatar").textContent = newName.charAt(0).toUpperCase();
      } catch (err) {
        status.textContent = "خطا در ذخیره، دوباره تلاش کنید.";
        status.className = "username-status err";
      }
    });

    document.getElementById("signoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "login.html";
    });
  });
</script>

</body>
</html>
