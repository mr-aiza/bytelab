# wrangler.toml — bytelab-telegram
# این فایل رو داخل پوشه‌ی telegram/ (کنار worker.js) توی گیت‌هاب قرار بده.
# با وجود این فایل، هر بار که از گیت‌هاب دیپلوی خودکار انجام بشه،
# binding ها (AI، Service binding به bytelab-ai، KV) پاک نمی‌شن و دوباره ساخته می‌شن.

name = "bytelab-telegram"
main = "worker.js"
compatibility_date = "2026-07-04"

# ---- Workers AI (برای تولید تصویر شاخص بلاگ) ----
[ai]
binding = "AI"

# ---- Service binding: اتصال مستقیم به Worker دیگه (bytelab-ai) بدون رفتن از اینترنت ----
[[services]]
binding = "AI_WORKER"
service = "bytelab-ai"

# ---- KV Namespace: ذخیره‌سازی لیدها، نمونه‌کارها، بلاگ، FAQ و... ----
# ⚠️ مقدار id رو باید خودت جایگزین کنی (راهنما پایین پیام).
[[kv_namespaces]]
binding = "LEADS_KV"
id = "PUT_YOUR_KV_NAMESPACE_ID_HERE"

# ---- Cron Triggers ----
[triggers]
crons = [
  "30 18 * * *",     # گزارش پایان روز
  "0 * * * *",       # چک پیگیری لیدها (هر ساعت)
  "30 4,9,16 * * *", # نوشتن خودکار پست بلاگ
  # "0 20 * * 5",    # بکاپ خودکار هفتگی (اختیاری - اگه می‌خوای فعال کن)
]
